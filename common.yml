.lint:
  stage: checks
  image: fedora:latest
  tags:
    - docker
  variables:
    BLACK_ARGS: -l80 -v --diff --color --check
  before_script:
    - if [ "$EUID" -ne 0 ]; then DNF="sudo dnf"; fi
    - ${DNF:-dnf} install -y python3-black python3-pylint python3-pip patch
    # remove when https://github.com/pylint-dev/astroid/issues/2190 is fixed
    - file_to_patch=$(python3 -c 'import astroid.builder;print(astroid.builder.__file__)') &&
      patch_url=https://github.com/QubesOS/qubes-continuous-integration/raw/main/scripts/pylint-astroid-workaround-2190.patch &&
      if grep -q 'from_node, global_names' "$file_to_patch"; then patch_url=${patch_url/.patch/-4.0.1.patch}; fi &&
      curl -sSL "$patch_url" | sudo patch "$file_to_patch"
    - patch_url=https://github.com/QubesOS/qubes-continuous-integration/raw/main/scripts/python-astroid-brain_gi.patch &&
      curl -sSL "$patch_url" | sudo patch -d /usr/lib/python3.*/site-packages -p 1
    - if [ -n "$PYREQUIREMENTS" ]; then pip3 install --quiet -r "$PYREQUIREMENTS"; fi
  script:
    - black $BLACK_ARGS --extend-exclude artifacts/ ${DIR:-.}
    - if [ -e .pylintrc ] && [ "${SKIP_PYLINT}" != "1" ]; then pylint-3 $PYLINT_ARGS ${DIR:-.}; fi

.shellcheck:
  stage: checks
  image: fedora:latest
  tags:
    - docker
  variables:
    SHELLCHECK_ARGS: -x -e SC1117
  before_script:
    - if [ "$EUID" -ne 0 ]; then DNF="sudo dnf"; fi
    - ${DNF:-dnf} install -y ShellCheck git file
  script:
    - >-
      git ls-files -z |
      xargs -0 file --mime-type |
      awk -F': *' '$2 == "text/x-shellscript" && $1 !~ /\.(j2|tpl|jinja2?)$/ {print $1}' |
      xargs -r shellcheck $SHELLCHECK_ARGS
