include:
 - example-configs/qubes-os-r4.3.yml

git:
  branch: main
  maintainers:
    # marmarek
    - '0064428F455451B3EBE78A7F063938BA42CFA724'
    # simon
    - '274E12AB03F2FE293765FC06DA0434BC706E1FCF'


backend-vmm: xen
verbose: true
reuse-fetched-source: true
skip-git-fetch: true
increment-devel-versions: true

repository-publish:
  components: current-testing
  templates: templates-community-testing

use-qubes-repo:
  version: 4.3
  testing: true

+components:
  - builder-archlinux:
      packages: false
      branch: main
  - core-vchan-xen:
      branch: omeg/builder-v2
      url: https://github.com/omeg/qubes-core-vchan-xen
      maintainers:
      - CE8060B48282B234AE0A7815D32BF219E67BA830
      verification-mode: less-secure-signed-commits-sufficient
  - core-qubesdb:
      branch: omeg/builder-v2
      url: https://github.com/omeg/qubes-core-qubesdb
      maintainers:
      - CE8060B48282B234AE0A7815D32BF219E67BA830
      verification-mode: less-secure-signed-commits-sufficient
  - zfs
  - zfs-dkms
  - vmm-xen-windows-pvdrivers
  - windows-utils:
      branch: omeg/builder-v2
      url: https://github.com/omeg/qubes-windows-utils
      maintainers:
      - CE8060B48282B234AE0A7815D32BF219E67BA830
      verification-mode: less-secure-signed-commits-sufficient
  - core-agent-windows:
      branch: omeg/builder-v2
      url: https://github.com/omeg/qubes-core-agent-windows
      maintainers:
      - CE8060B48282B234AE0A7815D32BF219E67BA830
      verification-mode: less-secure-signed-commits-sufficient
  - gui-agent-windows:
      branch: omeg/builder-v2
      url: https://github.com/omeg/qubes-gui-agent-windows
      maintainers:
      - CE8060B48282B234AE0A7815D32BF219E67BA830
      verification-mode: less-secure-signed-commits-sufficient
  - installer-qubes-os-windows-tools:
      branch: omeg/win10
      url: https://github.com/omeg/qubes-installer-windows-tools
      maintainers:
      - CE8060B48282B234AE0A7815D32BF219E67BA830
      verification-mode: less-secure-signed-commits-sufficient

distributions:
  - host-fc41
  - vm-win10:
     stages:
     - build:
         configuration: release
         sign-qube: win-sign-test
         sign-key-name: "Qubes Windows Tools"
         test-sign: true
         executor:
           type: windows
           options:
             dispvm: win-builder-dvm
             user: user
             ewdk: /home/user/ewdk.iso
             threads: 2
  - vm-bookworm
  - vm-trixie
  - vm-fc39
  - vm-fc40
  - vm-fc41
  - vm-fc42
  - vm-archlinux
  - vm-jammy
  - vm-noble

+templates:
  - fedora-40:
      dist: fc40
      options:
        - selinux
  - fedora-40-minimal:
      dist: fc40
      flavor: minimal
  - fedora-41:
      dist: fc41
      options:
        - selinux
  - fedora-41-xfce:
      dist: fc41
      flavor: xfce
      options:
        - selinux
  - fedora-41-minimal:
      dist: fc41
      flavor: minimal
  - fedora-42:
      dist: fc42
      options:
        - selinux
  - fedora-42-xfce:
      dist: fc42
      flavor: xfce
      options:
        - selinux
  - fedora-42-minimal:
      dist: fc42
      flavor: minimal
  - debian-12:
      dist: bookworm
      options:
        - gnome
        - firmware
  - debian-12-minimal:
      dist: bookworm
      flavor: minimal
      options:
      - no-recommends
  - debian-12-xfce:
      dist: bookworm
      flavor: xfce
      options:
        - standard
        - firmware
  - archlinux:
      dist: archlinux

executor:
  type: docker
  options:
    image: "qubes-builder-fedora:latest"

stages:
  - fetch
  - prep
  - pre
  - build
  - post
  - verify
  - sign:
      executor:
        type: local
  - publish:
      executor:
        type: local
  - upload:
      executor:
        type: local
